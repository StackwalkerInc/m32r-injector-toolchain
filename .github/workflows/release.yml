name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      gcc_version:
        description: 'GCC version override (e.g. 16.1.0); leave blank to use Dockerfile default'
        required: false
        default: ''
      binutils_version:
        description: 'binutils version override (e.g. 2.44); leave blank to use Dockerfile default'
        required: false
        default: ''
      codeinjector_version:
        description: 'codeinjector release tag override (e.g. 0.0.1); leave blank to use Dockerfile default'
        required: false
        default: ''

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract ARG defaults from Dockerfile
        id: args
        run: |
          echo "gcc=$(grep -oP 'ARG GCC_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT
          echo "binutils=$(grep -oP 'ARG BINUTILS_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT
          echo "codeinjector=$(grep -oP 'ARG CODEINJECTOR_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT

      - name: Resolve codeinjector tag to SHA
        id: codeinjector_sha
        run: |
          version="${{ inputs.codeinjector_version || steps.args.outputs.codeinjector }}"
          sha=$(git ls-remote https://github.com/RcusStackwalker/codeinjector.git "refs/tags/v${version}" | cut -f1)
          if [ -z "$sha" ]; then
            echo "ERROR: codeinjector tag v${version} not found"
            exit 1
          fi
          echo "Resolved codeinjector v${version} -> ${sha}"
          echo "sha=${sha}" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build single-arch for the runner first so we can smoke-test the image
      # locally before publishing. Layers populate the buildx cache; the
      # subsequent multi-arch push reuses them.
      - name: Build (load locally for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: m32r-toolchain:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GCC_VERSION=${{ inputs.gcc_version || steps.args.outputs.gcc }}
            BINUTILS_VERSION=${{ inputs.binutils_version || steps.args.outputs.binutils }}
            CODEINJECTOR_VERSION=${{ inputs.codeinjector_version || steps.args.outputs.codeinjector }}
            CODEINJECTOR_SHA=${{ steps.codeinjector_sha.outputs.sha }}

      - name: Smoke test — codeinjector end-to-end
        run: docker run --rm -v "$PWD/tests/smoke:/smoke:ro" m32r-toolchain:smoke /smoke/run.sh

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GCC_VERSION=${{ inputs.gcc_version || steps.args.outputs.gcc }}
            BINUTILS_VERSION=${{ inputs.binutils_version || steps.args.outputs.binutils }}
            CODEINJECTOR_VERSION=${{ inputs.codeinjector_version || steps.args.outputs.codeinjector }}
            CODEINJECTOR_SHA=${{ steps.codeinjector_sha.outputs.sha }}
