name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      gcc_version:
        description: 'GCC version override (e.g. 16.1.0); leave blank to use Dockerfile default'
        required: false
        default: ''
      binutils_version:
        description: 'binutils version override (e.g. 2.44); leave blank to use Dockerfile default'
        required: false
        default: ''
      codeinjector_version:
        description: 'codeinjector release tag override (e.g. 0.0.1); leave blank to use Dockerfile default'
        required: false
        default: ''

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GCC_VERSION=${{ inputs.gcc_version || '16.1.0' }}
            BINUTILS_VERSION=${{ inputs.binutils_version || '2.44' }}
            CODEINJECTOR_VERSION=${{ inputs.codeinjector_version || '0.0.1' }}
