name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      gcc_version:
        description: 'GCC version override (e.g. 16.1.0); leave blank to use Dockerfile default'
        required: false
        default: ''
      binutils_version:
        description: 'binutils version override (e.g. 2.44); leave blank to use Dockerfile default'
        required: false
        default: ''
      codeinjector_version:
        description: 'codeinjector release tag override (e.g. 0.1.2); leave blank to use Dockerfile default'
        required: false
        default: ''

jobs:
  # Build each platform on its native runner. QEMU-emulating an arm64 GCC 16
  # cross-toolchain on an amd64 runner took ~4 hours per release; native arm64
  # runners bring this down to comparable wall time for both matrix legs and
  # let them run in parallel. Each leg builds, smoke-tests locally, then
  # pushes the image by digest only — manifest tags are applied in the
  # `merge` job so a smoke-test failure on one platform aborts the release
  # before any tag is moved.
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Prepare platform pair
        id: prep
        run: |
          platform=${{ matrix.platform }}
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT

      # Docker image refs must be lowercase. ${{ github.repository }} keeps
      # original casing (e.g. "StackwalkerInc/..."), which breaks
      # `outputs: type=image,name=ghcr.io/${{ github.repository }}` directly.
      # docker/metadata-action lowercases automatically; this step does the
      # same for the bits of the workflow that don't go through it.
      - name: Resolve lowercase image ref
        id: image
        run: echo "ref=ghcr.io/$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract ARG defaults from Dockerfile
        id: args
        run: |
          echo "gcc=$(grep -oP 'ARG GCC_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT
          echo "binutils=$(grep -oP 'ARG BINUTILS_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT
          echo "codeinjector=$(grep -oP 'ARG CODEINJECTOR_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT

      - name: Resolve codeinjector tag to SHA
        id: codeinjector_sha
        run: |
          version="${{ inputs.codeinjector_version || steps.args.outputs.codeinjector }}"
          sha=$(git ls-remote https://github.com/StackwalkerInc/codeinjector.git "refs/tags/v${version}" | cut -f1)
          if [ -z "$sha" ]; then
            echo "ERROR: codeinjector tag v${version} not found"
            exit 1
          fi
          echo "Resolved codeinjector v${version} -> ${sha}"
          echo "sha=${sha}" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build locally first so the next step (smoke test) can run against the
      # produced image. The subsequent push-by-digest build hits the same
      # per-platform GHA cache and finishes in seconds.
      - name: Build (load locally for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: m32r-toolchain:smoke
          cache-from: type=gha,scope=${{ steps.prep.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.pair }}
          build-args: |
            GCC_VERSION=${{ inputs.gcc_version || steps.args.outputs.gcc }}
            BINUTILS_VERSION=${{ inputs.binutils_version || steps.args.outputs.binutils }}
            CODEINJECTOR_VERSION=${{ inputs.codeinjector_version || steps.args.outputs.codeinjector }}
            CODEINJECTOR_SHA=${{ steps.codeinjector_sha.outputs.sha }}

      - name: Smoke test — codeinjector end-to-end
        run: docker run --rm -v "$PWD/tests/smoke:/smoke:ro" m32r-toolchain:smoke /smoke/run.sh

      - name: Push by digest
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.prep.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.pair }}
          build-args: |
            GCC_VERSION=${{ inputs.gcc_version || steps.args.outputs.gcc }}
            BINUTILS_VERSION=${{ inputs.binutils_version || steps.args.outputs.binutils }}
            CODEINJECTOR_VERSION=${{ inputs.codeinjector_version || steps.args.outputs.codeinjector }}
            CODEINJECTOR_SHA=${{ steps.codeinjector_sha.outputs.sha }}

      - name: Export digest to artifact
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-platform digests into a multi-arch manifest and tag it
  # (semver + :latest). Runs only if every build leg's smoke test passed.
  merge:
    name: Create manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve lowercase image ref
        id: image
        run: echo "ref=ghcr.io/$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.ref }}@sha256:%s ' *)

      - name: Inspect resulting image
        run: docker buildx imagetools inspect ${{ steps.image.outputs.ref }}:${{ steps.meta.outputs.version }}
