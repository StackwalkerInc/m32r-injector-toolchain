name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write   # to dispatch release.yml after bumping

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - id: bump
        uses: tomtom-international/commisery-action/bump@a34695e80d301291c6c5ef5642f2d06c8d5289a5 # v6.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-tag: true

      # commisery-action pushes any new tag with GITHUB_TOKEN. Tag pushes made
      # via GITHUB_TOKEN do NOT fire `push: tags: ['v*']` triggers (GitHub's
      # workflow-recursion guard), so release.yml would silently skip the new
      # tag — as happened with v1.1.0. Explicitly dispatch release.yml here.
      # workflow_dispatch is one of the events excluded from the recursion
      # guard, so this works with the default GITHUB_TOKEN.
      - name: Dispatch release.yml for the new tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force
          tag=$(git tag --points-at HEAD --sort=-creatordate | head -1)
          if [ -z "$tag" ]; then
            echo "No tag at HEAD — nothing to release."
            exit 0
          fi
          echo "Dispatching release.yml for $tag"
          gh workflow run release.yml --ref "$tag"
