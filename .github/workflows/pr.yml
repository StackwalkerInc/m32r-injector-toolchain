name: PR

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract ARG defaults from Dockerfile
        id: args
        run: |
          echo "codeinjector=$(grep -oP 'ARG CODEINJECTOR_VERSION=\K\S+' Dockerfile)" >> $GITHUB_OUTPUT

      - name: Resolve codeinjector tag to SHA
        id: codeinjector_sha
        run: |
          version="${{ steps.args.outputs.codeinjector }}"
          sha=$(git ls-remote https://github.com/StackwalkerInc/codeinjector.git "refs/tags/v${version}" | cut -f1)
          if [ -z "$sha" ]; then
            echo "ERROR: codeinjector tag v${version} not found"
            exit 1
          fi
          echo "sha=${sha}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: m32r-toolchain:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CODEINJECTOR_SHA=${{ steps.codeinjector_sha.outputs.sha }}

      - name: Smoke test — m32r-elf-gcc
        run: docker run --rm m32r-toolchain:pr m32r-elf-gcc --version

      - name: Smoke test — m32r-elf-objdump
        run: docker run --rm m32r-toolchain:pr m32r-elf-objdump --version

      - name: Smoke test — cmake
        run: docker run --rm m32r-toolchain:pr cmake --version

      - name: Smoke test — codeinjector --help
        run: docker run --rm m32r-toolchain:pr codeinjector --help

      - name: Smoke test — codeinjector end-to-end
        run: docker run --rm -v "$PWD/tests/smoke:/smoke:ro" m32r-toolchain:pr /smoke/run.sh
